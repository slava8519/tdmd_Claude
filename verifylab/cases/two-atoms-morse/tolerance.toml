# Tolerances for the two-atoms-morse VerifyLab case.
# Loosening any of these requires an ADR.
#
# threshold       = fp64 mode (the default when no _mixed override)
# threshold_mixed = mixed precision mode
#
# fp64 targets machine epsilon for doubles (~1e-15) with a factor-10 margin
# for accumulated rounding in the Morse evaluation path. mixed targets
# float32 epsilon (~1e-7) with a factor-10 margin.

[forces]
# Max relative error of any force component vs analytic.
mode = "max_relative"
threshold = 1e-14          # fp64
threshold_mixed = 1e-6     # mixed (float32 force path)

[energy]
mode = "absolute"
unit = "eV"
threshold = 1e-14          # fp64
threshold_mixed = 1e-6     # mixed

[ab_lammps_force]
# Max relative error vs LAMMPS reference (FP64 in both)
mode = "max_relative"
threshold = 1e-10

[ab_lammps_energy]
mode = "absolute"
unit = "eV"
threshold = 1e-10

[case]
# Whether this case runs in the fast CI suite (every PR) or only nightly.
slow = false
