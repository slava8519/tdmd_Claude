name: verifylab

on:
  push:
    branches: [main]
  schedule:
    # nightly full suite
    - cron: '0 3 * * *'

jobs:
  fast-suite:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ python3
      - name: Build
        run: ./scripts/build.sh
      - name: Run VerifyLab fast suite
        run: ./scripts/run-verifylab.sh --suite fast || echo "VerifyLab not yet available at M0"
